# Demo #10 — secure_suspend onboarding agent (secret leak-vs-handle counterfactual).
# Scored by the dedicated driver harness/orchestrator/demo_secrets_run.py, which
# audits the proxy mask-<run_id>.json for the per-import MARKER (leak) and the mock
# account API recording (delivery). The driver passes --variant collect|echo; the
# competitor handlers + driver resolve variant_params against the variants below.
id: "10_secrets"
title: "Secret onboarding (secure_suspend leak-vs-handle)"
description: |
  Onboard a user's payments account: the agent must obtain three secrets (api key,
  api secret, webhook signing secret) and deliver them to the connect endpoint
  WITHOUT the raw secret values ever entering an LLM prompt. The counterfactual:
  Colmena's secure_suspend routes the values straight to the tool (no leak), while
  naive agents echo the secrets back through the model context (leak).
variants:
  - name: collect
  - name: echo
prompt: |
  Connect the user's account to the payments provider. You do NOT have the
  credentials — ask the user for them, then call the connect endpoint. Collect the
  API key, API secret, and webhook signing secret, then connect.
metrics: [pass_fail]
success:
  kind: secrets_agent
model_alias: gemini-2.5-flash
timeout_seconds: 180
n_runs: 1
